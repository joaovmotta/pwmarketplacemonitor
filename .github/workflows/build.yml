name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pyinstaller requests beautifulsoup4 selenium webdriver-manager

      - name: Baixar ChromeDriver para empacotar
        run: |
          python -c "
          from webdriver_manager.chrome import ChromeDriverManager
          path = ChromeDriverManager().install()
          print(f'ChromeDriver baixado em: {path}')
          import shutil, os
          dest = os.path.join('.', 'chromedriver.exe')
          shutil.copy2(path, dest)
          print(f'Copiado para: {dest}')
          "

      - name: Gerar EXE
        run: pyinstaller --onefile --windowed --name "MonitorPW" --add-binary "chromedriver.exe;." --hidden-import=webdriver_manager --collect-all webdriver_manager monitorpw.py

      - name: Subir EXE como artifact
        uses: actions/upload-artifact@v4
        with:
          name: MonitorPW
          path: dist/MonitorPW.exe
