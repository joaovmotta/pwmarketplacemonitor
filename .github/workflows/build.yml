name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pyinstaller requests beautifulsoup4

      - name: Gerar EXE
        run: pyinstaller --onefile --windowed --name "MonitorPW" monitorpw.py

      - name: Subir EXE como artifact
        uses: actions/upload-artifact@v4
        with:
          name: MonitorPW
          path: dist/MonitorPW.exe
